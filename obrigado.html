<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Obrigado — Darla Imoveis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0d1a1f; --gold: #c8893a; --ocean: #1b4f63; --white: #fff; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--ocean); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    .check { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; line-height: 1.15; margin-bottom: 1.2rem; }
    h1 em { font-style: italic; color: #f0d8b8; }
    p { font-size: 0.95rem; font-weight: 300; color: rgba(255,255,255,0.7); line-height: 1.75; max-width: 460px; margin-bottom: 2.5rem; }
    .btn { display: inline-block; background: var(--gold); color: var(--white); font-family: 'Outfit', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none; padding: 1rem 2.5rem; transition: background 0.2s; }
    .btn:hover { background: #b37730; }
    .note { margin-top: 2.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="check">&#10003;</div>
  <h1>Obrigado pelo<br><em>seu contato!</em></h1>
  <p>Recebemos suas informacoes. A Darla entrara em contato em breve com as melhores opcoes disponiveis para voce.</p>
  <a href="https://darlaimoveis.com.br/" class="btn">Voltar ao site</a>
  <p class="note">Darla Imoveis · Rio de Janeiro e Niteroi, RJ, Brasil</p>
</body>
</html>
